<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Sign-up Page</title>

    <!-- Link to css style sheet -->
    <link rel="stylesheet" href="login-signup-UI.css"> 
</head>
<body>
    <div class="center-container">
        <h1>Welcome to ClimaCloset!</h1>

        <!-- Buttons for sign up, login, and forgot password -->
        <label for="signUp"><b>Don't have an account?</b></label>
        <button id="signUp" onclick="location.href='signup-page.html'">Sign-up</button>
        <label for="logIn"><b>Already have an account?</b></label>
        <button id="logIn" onclick="location.href='login-page.html'">Login</button>
        <a href="#" id="forgotPassword" onclick="onClick(event)">Forgot password?</a>
        
        <div class="grass"></div>
    </div>

    <script> 
        // Placeholder javascript to handle different button clicks
        function onClick(event) {
            var elementId = event.target.id;

            if (elementId === "signUp") {
                alert("*Sign-up button click detected!");
            }
            else if (elementId === "logIn") {
                alert("*Login button click detected!");
            }
            else if (elementId === "forgotPassword") {
                alert("*Forgot password link click detected!");
            }
        }
    </script>
</body>
</html>
