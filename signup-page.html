<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Page</title>

    <!-- Link to css style sheet -->
    <link rel="stylesheet" href="login-signup-UI.css"> 
</head>

<body>  
    <div class="center-container">
        <div class="title-container">
            <h1><b>Sign-up for ClimaCloset</b></h1>
        </div>
    
        <!--Textfields for username, password, confirm password-->
        <!-- <form action="undetermined" method="post"> , will be used when we know where to send data--> 
        <div class="middle-container">
            <div class="signup-area">
                <div class="input-container">
                    <label for="username">Enter username</label>
                    <input type="text" id="newusername" placeholder="username">
                </div>
                <div class="input-container">
                    <label for="password">Enter password</label>
                    <input type="password" id="newpassword" placeholder="password">
                </div>
                <div class="input-container">
                    <label for="repassword">Re-enter password</label>
                    <input type="password" id="repassword" placeholder="password">
                </div>
                <button id="signupBtn">Submit</button>
            </div>
        </div>
        <!-- </form> to close form later -->
     
        <!--Link back to signup screen-->
        <a href="login-signup-UI.html">Back to main page</a>


        <script src="testcreateAccount.js"></script>
        <div class ="grass"></div>
</div>
</body>
</html>
