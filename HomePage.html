<html>
    <head>
        <meta charset="UTF-8">

        <title>Home Page</title>
        <link rel="stylesheet" href="HomePageStyle.css">
    </head>

    <body>
        <div class="aspect-ratio-box">
            <h1>Home Page</h1>
            <p>Welcome back, User!</p>
            <div class="container">
                <div class="dashboard">
                    <div class="rectangle">
                        <p class="dash">Dashboard</p>
                        <button class="closetDetails">View Closet Details</button>
                        <button class="circle">Generate Outfit</button>
                        <button class="weatherDetails">View Weather Details</button>
                    </div>
                </div>
            </div>
            <div class="info-container">
                <p class="closet-capacity">
                    <span class="closet-text">Current Closet Capacity</span>
                    <span class="weather-text">Current Weather Status</span>
                </p>
            </div>
                <p class="location-info">
                    <span class="closet-items">Your closet has:</span>
                    <span class="location">Morgantown, WV</span>
                </p>
                <p class="details-info">
                    <span class="item-count">XX Items</span>
                    <span class="weather-status">XX° Sunny</span>
                </p>
                 
            <div class="image-container">
                <img src="file://C:\Users\blake\Documents\GitHub\ClimaCloset\150367.png" alt="Image 1">
                <img src="file://C:\Users\blake\Documents\GitHub\ClimaCloset\13449.png" alt="Image 2">
            </div>
            <script src="HomePageScript.js"></script>
        </div>
